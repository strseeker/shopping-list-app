<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    h1 span {
      font-size: 1.6rem;
    }

    /* 입력 영역 */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      background: #fff;
      color: #1a202c;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #5a67d8; }
    .btn-add:active { transform: scale(0.97); }

    /* 필터/통계 바 */
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .count {
      font-size: 0.85rem;
      color: #718096;
    }

    .filters {
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #e2e8f0;
      background: #fff;
      color: #718096;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    /* 리스트 */
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      transition: opacity 0.2s, border-color 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.done {
      opacity: 0.55;
      border-color: #e2e8f0;
    }

    /* 커스텀 체크박스 */
    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #cbd5e0;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .item.done .checkbox {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox-icon {
      display: none;
      width: 12px;
      height: 12px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .item.done .checkbox-icon { display: block; }

    /* 아이템 텍스트 */
    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    /* 삭제 버튼 */
    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      color: #cbd5e0;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .btn-del:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #a0aec0;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 8px; }
    .empty p { font-size: 0.95rem; }

    /* 전체 삭제 */
    .footer {
      margin-top: 16px;
      text-align: right;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .btn-clear:hover {
      color: #fc8181;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="newItem" placeholder="아이템 입력 후 Enter" maxlength="60">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="meta-row">
      <span class="count" id="count"></span>
      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">전체</button>
        <button class="filter-btn" data-filter="active" onclick="setFilter(this)">미완료</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter(this)">완료</button>
      </div>
    </div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(it =>
        filter === 'all' ? true :
        filter === 'done' ? it.done :
        !it.done
      );

      const total = items.length;
      const done = items.filter(i => i.done).length;
      document.getElementById('count').textContent =
        total ? `총 ${total}개 · 완료 ${done}개` : '';

      if (!filtered.length) {
        list.innerHTML = `
          <li class="empty">
            <div class="empty-icon">🧺</div>
            <p>${filter === 'done' ? '완료된 항목이 없습니다.' :
               filter === 'active' ? '미완료 항목이 없습니다.' :
               '아이템을 추가해 보세요!'}</p>
          </li>`;
        return;
      }

      list.innerHTML = filtered.map(it => `
        <li class="item${it.done ? ' done' : ''}" id="item-${it.id}">
          <div class="checkbox" onclick="toggle(${it.id})">
            <svg class="checkbox-icon" viewBox="0 0 12 12">
              <polyline points="2,6 5,9 10,3"/>
            </svg>
          </div>
          <span class="item-text">${escHtml(it.text)}</span>
          <button class="btn-del" onclick="remove(${it.id})" title="삭제">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="3" x2="13" y2="13"/>
              <line x1="13" y1="3" x2="3" y2="13"/>
            </svg>
          </button>
        </li>`).join('');
    }

    function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggle(id) {
      const it = items.find(i => i.id === id);
      if (it) { it.done = !it.done; save(); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
